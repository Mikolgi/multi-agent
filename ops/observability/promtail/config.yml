server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: resume-copilot-runs
    static_configs:
      - targets:
          - localhost
        labels:
          job: resume-copilot-runs
          app: resume-copilot
          __path__: /var/log/resume-copilot/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            finished_at: finished_at
            mode: mode
            model: model
            status: status
            objective: objective
            total_duration_ms: total_duration_ms
            error: error
      - labels:
          mode:
          model:
          status:
      - timestamp:
          source: finished_at
          format: RFC3339
